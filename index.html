<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Fashion Enterprise | Phones, Laptops & Accessories</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');

        .logo-font { font-family: 'Space Grotesk', sans-serif; }

        .hero-bg { 
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }

        .product-card {
            transition: all 0.4s ease;
        }
        .product-card:hover {
            transform: translateY(-12px);
        }

        /* ✅ FIXED STAFF SLIDE */
        .staff-slide {
            position: absolute;
            inset: 0;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;

            opacity: 0;
            visibility: hidden;
            pointer-events: none;

            transition: opacity 0.8s ease;
        }

        .staff-slide.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        /* ✅ TEXT FIX */
        .staff-mobile h3 {
            line-height: 1.2;
            margin-bottom: 6px;
        }

        .staff-mobile .role {
            margin-bottom: 10px;
        }

        .staff-quote {
            line-height: 1.6;
        }

        /* WhatsApp */
        .floating-btn {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25D366;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
    </style>
</head>

<body class="bg-zinc-950 text-white">

<!-- NAV -->
<nav class="bg-black p-4 flex justify-between">
    <h1 class="logo-font text-2xl">Mobile Fashion</h1>
</nav>

<!-- HERO -->
<section class="hero-bg py-20 text-center">

    <h1 class="text-5xl mb-6">Your Trusted Tech Partner</h1>

    <!-- STAFF -->
    <div class="max-w-3xl mx-auto mt-12">
        <h2 class="text-3xl mb-2">Meet Our Staff</h2>
        <p class="text-cyan-400 mb-6">Our amazing team</p>

        <div id="staff-slideshow" class="relative h-[500px] bg-zinc-900 rounded-3xl overflow-hidden"></div>
    </div>

</section>

<!-- FOOTER -->
<footer class="text-center py-10">
    <p>© 2026 Mobile Fashion Enterprise</p>
</footer>

<!-- WhatsApp -->
<a href="#" class="floating-btn">
    <i class="fa-brands fa-whatsapp"></i>
</a>

<script>
let staff = [];

/* LOAD DATA */
async function loadData() {
    try {
        const res = await fetch('https://bandaamos98-create.github.io/mobile-fashion/products.json');
        const data = await res.json();

        staff = data.staff || [];

        renderStaffSlideshow();

    } catch(e) {
        console.error(e);
    }
}

/* RENDER STAFF */
function renderStaffSlideshow() {
    const container = document.getElementById('staff-slideshow');

    let html = '';

    staff.forEach((m, i) => {
        html += `
        <div class="staff-slide staff-mobile ${i === 0 ? 'active' : ''}">

            <img src="${m.img}" 
                 class="w-56 h-56 object-cover rounded-3xl mb-6">

            <h3 class="text-3xl font-semibold">${m.name}</h3>

            <p class="text-cyan-400 role">${m.role}</p>

            <p class="staff-quote italic text-white/80 max-w-md">
                "${m.quote}"
            </p>

        </div>`;
    });

    container.innerHTML = html;

    startSlideshow();
}

/* SLIDER */
function startSlideshow() {
    const slides = document.querySelectorAll('.staff-slide');

    let index = 0;

    setInterval(() => {
        slides[index].classList.remove('active');

        index = (index + 1) % slides.length;

        slides[index].classList.add('active');
    }, 5000);
}

window.onload = loadData;
</script>

</body>
</html>
